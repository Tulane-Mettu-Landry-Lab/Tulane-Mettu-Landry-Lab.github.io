about:
  title: "About This Lab"
  desc: |
    <p>
    The <strong>Mettu Landry Lab</strong> is a research lab led by Dr. Mettu from the Department of Computer Science at Tulane University.
    We are discovering scientific problems (e.g. immunology) using computational methods and explainable machine learning.
    Explore our work and discover how we are pushing the boundaries of research in these cutting-edge areas.
    </p>

